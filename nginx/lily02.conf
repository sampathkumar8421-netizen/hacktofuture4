# Lily02 Nginx Reverse Proxy Configuration
# ------------------------------------------
# Maps the React frontend and FastAPI backend behind a single localhost address.
#
# Frontend (Vite dev): http://localhost:5173
# Backend (FastAPI):   http://localhost:8000
# Nginx proxy:         http://localhost:80
#
# To use: copy this file to your nginx/conf/ directory and reload.

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    upstream lily02_backend {
        server 127.0.0.1:8000;
    }

    upstream lily02_frontend {
        server 127.0.0.1:5173;
    }

    server {
        listen 80;
        server_name localhost;

        # API routes -> FastAPI
        location /api/ {
            proxy_pass http://lily02_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        # Everything else -> React dev server
        location / {
            proxy_pass http://lily02_frontend;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
